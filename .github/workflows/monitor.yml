name: Wave Defeated Monitor

on:
  schedule:
    # Every 5 minutes. NOTE: GitHub Actions cron can be delayed by a few
    # minutes under load; it will never run *more* often than this.
    - cron: "*/5 * * * *"
  workflow_dispatch: # manual "Run workflow" button

permissions:
  contents: read

concurrency:
  group: wave-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Persist state.json across runs using the actions cache.
      # Each run uses a unique key (run_number) and restores the most recent
      # previous state via restore-keys, so the cooldown dedup survives.
      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: state.json
          key: wave-monitor-state-${{ github.run_number }}
          restore-keys: |
            wave-monitor-state-

      - name: Run monitor
        env:
          VMOS_ACCESS_KEY: ${{ secrets.VMOS_ACCESS_KEY }}
          VMOS_SECRET_KEY: ${{ secrets.VMOS_SECRET_KEY }}
          VMOS_HOST: ${{ secrets.VMOS_HOST }}
          PAD_CODES: ${{ secrets.PAD_CODES }}
          IMAGE_FORMAT: ${{ vars.IMAGE_FORMAT }}
          SETTLE_SECONDS: ${{ vars.SETTLE_SECONDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_LOG_CHAT_ID: ${{ secrets.TELEGRAM_LOG_CHAT_ID }}
          WAVE_DEFEATED_KEYWORDS: ${{ vars.WAVE_DEFEATED_KEYWORDS }}
          ALERT_COOLDOWN_SECONDS: ${{ vars.ALERT_COOLDOWN_SECONDS }}
          STATE_FILE: state.json
        run: python monitor.py

      # Upload the latest screenshots as artifacts so you can inspect OCR
      # accuracy and debug false positives/negatives.
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7
